<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zcode2api · 验证码</title>
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
  <style>
    .captcha-container{max-width:960px;margin:0 auto;padding:20px 0}
    .captcha-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
    @media(max-width:768px){.captcha-grid{grid-template-columns:1fr}}
    .captcha-panel{background:#fff;border-radius:14px;padding:20px;border:1px solid var(--border)}
    .captcha-panel-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
    .captcha-status{display:flex;align-items:center;gap:8px;font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:14px}
    .captcha-status.connected{background:#f0fdf4;color:#16a34a}
    .captcha-status.disconnected{background:#fef2f2;color:#dc2626}
    .captcha-status.waiting{background:#fff4ed;color:#b0632a}
    #captcha-element{min-height:60px;display:flex;align-items:center;justify-content:center}
    #captcha-button{display:none}
    .code-block{background:#1a1a2e;color:#e0e0e0;border-radius:8px;padding:16px;font-size:12px;line-height:1.6;overflow-x:auto;font-family:'Geist Mono',ui-monospace,monospace;white-space:pre;position:relative}
    .code-block .copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.1);color:#aaa;font-size:11px;cursor:pointer;border:none}
    .code-block .copy-btn:hover{background:rgba(255,255,255,.2);color:#fff}
    .log-area{background:#f7f7f7;border-radius:8px;padding:12px;font-size:12px;font-family:'Geist Mono',ui-monospace,monospace;max-height:200px;overflow-y:auto;margin-top:12px;color:#555}
    .log-area div{padding:2px 0}
    .log-area .log-ok{color:#16a34a}
    .log-area .log-err{color:#dc2626}
    .log-area .log-warn{color:#b0632a}
    .captcha-result{margin-top:12px;padding:10px 14px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;font-family:monospace;word-break:break-all;color:#16a34a;display:none}
    .tab-bar{display:flex;gap:2px;margin-bottom:14px}
    .tab-btn{padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;color:#8f8f8f;background:transparent;border:none}
    .tab-btn:hover{color:#555}
    .tab-btn.active{background:#111;color:#fff}
    .tab-content{display:none}
    .tab-content.active{display:block}
  </style>
</head>
<body>
<div id="admin-header" data-active="/admin/captcha"></div>

<main class="admin-main">
  <div class="page-hd">
    <div>
      <div class="page-title">验证码管理</div>
      <div class="page-sub">阿里云无痕验证 · WebSocket 任务下发 · 页面/Node 求解</div>
    </div>
  </div>

  <div class="captcha-container">
    <div id="ws-status" class="captcha-status disconnected">未连接</div>

    <div class="captcha-grid">
      <!-- 左侧：页面验证 -->
      <div class="captcha-panel">
        <div class="captcha-panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          页面验证
        </div>
        <div id="captcha-element">
          <span style="color:#aaa;font-size:13px">连接 WebSocket 后自动加载验证码</span>
        </div>
        <button id="captcha-button"></button>
        <div id="captcha-result" class="captcha-result"></div>
        <div id="page-log" class="log-area"></div>
      </div>

      <!-- 右侧：Node 求解示例 -->
      <div class="captcha-panel">
        <div class="captcha-panel-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Node 求解示例
        </div>
        <div class="tab-bar">
          <button class="tab-btn active" onclick="switchTab('solver')">solver.js (WS)</button>
          <button class="tab-btn" onclick="switchTab('usage')">使用方法</button>
        </div>
        <div id="tab-solver" class="tab-content active">
          <div class="code-block"><button class="copy-btn" onclick="copyCode('solver-code')">复制</button><code id="solver-code"></code></div>
        </div>
        <div id="tab-usage" class="tab-content">
          <div class="code-block"><button class="copy-btn" onclick="copyCode('usage-code')">复制</button><code id="usage-code"></code></div>
        </div>
        <div id="node-log" class="log-area"></div>
      </div>
    </div>
  </div>
</main>

<script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
<script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
<script src="/static/js/header.js?v={{APP_VERSION}}"></script>
<script>
(async()=>{
  await renderAdminHeader();
})();

let ws=null, reconnectTimer=null, taskConfig=null;

function wsConnect(){
  if(ws && ws.readyState<=1) return;
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(`${proto}//${location.host}/captcha/ws`);
  ws.onopen=()=>{
    updateStatus('connected','已连接');
    log('page','WebSocket 已连接','ok');
    if(taskConfig) ws.send(JSON.stringify({type:'ready'}));
  };
  ws.onmessage=(e)=>{
    try{
      const data=JSON.parse(e.data);
      if(data.type==='solve'){
        taskConfig=data;
        log('page',`收到求解任务: scene=${data.scene}, region=${data.region}`,'warn');
        initCaptcha(data);
      }else if(data.type==='pong'){
        // heartbeat
      }
    }catch{}
  };
  ws.onclose=()=>{
    updateStatus('disconnected','连接断开，3秒后重连…');
    log('page','WebSocket 断开','err');
    scheduleReconnect();
  };
  ws.onerror=()=>{
    updateStatus('disconnected','连接失败');
    log('page','WebSocket 连接失败','err');
  };
}

function scheduleReconnect(){
  if(reconnectTimer) clearTimeout(reconnectTimer);
  reconnectTimer=setTimeout(wsConnect,3000);
}

function updateStatus(cls,text){
  const el=document.getElementById('ws-status');
  el.className='captcha-status '+cls;
  el.textContent=text;
}

function log(panel,text,cls){
  const el=document.getElementById(panel==='page'?'page-log':'node-log');
  const div=document.createElement('div');
  if(cls) div.className='log-'+cls;
  const now=new Date().toLocaleTimeString();
  div.textContent=`[${now}] ${text}`;
  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

// ── 阿里云验证码初始化 ──
let captchaInited=false;
function initCaptcha(config){
  if(captchaInited){
    try{
      const btn=document.getElementById('captcha-button');
      if(btn) btn.click();
    }catch{}
    return;
  }
  const el=document.getElementById('captcha-element');
  el.innerHTML='';
  captchaInited=true;
  const s=document.createElement('script');
  s.src='https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js';
  s.onload=()=>{
    log('page','阿里云 SDK 加载完成','ok');
    try{
      window.initAliyunCaptcha({
        SceneId:config.scene,
        mode:'popup',
        region:config.region,
        prefix:config.prefix,
        element:'#captcha-element',
        button:'#captcha-button',
        captchaLogoImg:'',
        showErrorTip:false,
        slideStyle:{width:360,height:40},
        getInstance:(inst)=>{
          try{(inst.startTracelessVerification||inst.show).call(inst);}catch(e){log('page','启动验证失败: '+e.message,'err');}
        },
        success:(param)=>{
          log('page','验证成功，提交结果','ok');
          document.getElementById('captcha-result').style.display='block';
          document.getElementById('captcha-result').textContent='verifyParam: '+param.substring(0,40)+'…';
          if(ws && ws.readyState===1){
            ws.send(JSON.stringify({type:'result',verifyParam:param}));
            log('page','已通过 WS 提交 verifyParam','ok');
          }
        },
        fail:()=>{log('page','验证失败','err');},
        onError:(e)=>{log('page','验证错误: '+e,'err');},
      });
    }catch(e){log('page','初始化验证码失败: '+e.message,'err');}
  };
  s.onerror=()=>{log('page','加载阿里云 SDK 失败','err');};
  document.head.appendChild(s);
}

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['solver','usage'][i]===name);
  });
  document.querySelectorAll('.tab-content').forEach((p,i)=>{
    p.classList.toggle('active',['solver','usage'][i]===name);
  });
}

function copyCode(id){
  const text=document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(()=>showToast('已复制','success')).catch(()=>{});
}

// ── Node 求解示例代码 ──
const SOLVER_CODE=`const WebSocket = require('ws');

const SERVER = process.env.CAPTCHA_WS_URL || 'ws://127.0.0.1:3000/captcha/ws';
const { JSDOM, VirtualConsole } = require('jsdom');

const vc = new VirtualConsole();
const html = \`<!DOCTYPE html><html><head></head><body>
<div id="cap"></div><button id="btn"></button>
<script src="https://o.alicdn.com/captcha-frontend/aliyunCaptcha/AliyunCaptcha.js"><\\/script>
</body></html>\`;

function createDOM(scene, region, prefix, onResult) {
  const dom = new JSDOM(html, {
    url: 'https://zcode.z.ai/',
    runScripts: 'dangerously',
    resources: 'usable',
    pretendToBeVisual: true,
    virtualConsole: vc,
    beforeParse(window) {
      window.matchMedia = () => ({ matches:false, media:'', onchange:null, addListener(){}, removeListener(){}, addEventListener(){}, removeEventListener(){}, dispatchEvent(){return false;} });
      const proto = window.HTMLCanvasElement.prototype;
      proto.getContext = function (type) {
        if (/webgl/i.test(type)) return { canvas:this, getParameter:()=>'Intel', getExtension:()=>null, getSupportedExtensions:()=>['WEBGL_debug_renderer_info'], getContextAttributes:()=>({}), getShaderPrecisionFormat:()=>({precision:23,rangeMin:127,rangeMax:127}) };
        return { canvas:this, fillRect(){}, clearRect(){}, getImageData:(x,y,w=1,h=1)=>({data:new Uint8ClampedArray(w*h*4)}), putImageData(){}, createImageData:(w=1,h=1)=>({data:new Uint8ClampedArray(w*h*4)}), setTransform(){}, transform(){}, drawImage(){}, save(){}, restore(){}, beginPath(){}, moveTo(){}, lineTo(){}, bezierCurveTo(){}, quadraticCurveTo(){}, closePath(){}, clip(){}, stroke(){}, fill(){}, arc(){}, rect(){}, ellipse(){}, translate(){}, scale(){}, rotate(){}, fillText(){}, strokeText(){}, measureText:(t)=>({width:(''+t).length*8}), createLinearGradient:()=>({addColorStop(){}}), createRadialGradient:()=>({addColorStop(){}}), createPattern:()=>({}), isPointInPath:()=>false, font:'10px sans-serif', textBaseline:'alphabetic', textAlign:'start', fillStyle:'#000', strokeStyle:'#000', globalAlpha:1, lineWidth:1, shadowBlur:0, shadowColor:'' };
      };
      proto.toDataURL = () => 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg==';
      proto.toBlob = (cb) => cb && cb(null);
      window.Worker = class { constructor(){} postMessage(){} terminate(){} addEventListener(){} removeEventListener(){} onmessage=null; onerror=null; };
      window.OffscreenCanvas = window.OffscreenCanvas || class { constructor(w,h){this.width=w;this.height=h;} getContext(){return proto.getContext.call(this);} };
    },
  });
  const { window } = dom;

  function waitFor(cond, t = 12000) {
    return new Promise((res, rej) => {
      const s = Date.now();
      const i = setInterval(() => { let ok=false; try{ok=cond();}catch{} if(ok){clearInterval(i);res();} else if(Date.now()-s>t){clearInterval(i);rej(new Error('timeout'));} }, 80);
    });
  }

  (async () => {
    await waitFor(() => typeof window.initAliyunCaptcha === 'function');
    window.initAliyunCaptcha({
      SceneId: scene, mode: 'popup', region, prefix,
      element: '#cap', button: '#btn', captchaLogoImg: '', showErrorTip: false,
      getInstance: (inst) => { try { (inst.startTracelessVerification || inst.show).call(inst); } catch (e) {} },
      success: (param) => { onResult(param); },
      fail: () => { onResult(null); },
      onError: () => { onResult(null); },
    });
    setTimeout(() => onResult(null), 25000);
  })().catch(() => onResult(null));
}

function connectWS() {
  const ws = new WebSocket(SERVER);
  ws.on('open', () => { console.log('[ws] connected'); });
  ws.on('message', (raw) => {
    try {
      const data = JSON.parse(raw);
      if (data.type !== 'solve') return;
      console.log('[ws] task received:', data.scene, data.region);
      createDOM(data.scene, data.region, data.prefix, (result) => {
        if (result) {
          ws.send(JSON.stringify({ type: 'result', verifyParam: result }));
          console.log('[ws] result submitted');
        }
      });
    } catch {}
  });
  ws.on('close', () => { console.log('[ws] disconnected, reconnecting...'); setTimeout(connectWS, 3000); });
  ws.on('error', () => {});
}

connectWS();`;

const USAGE_CODE=`# 1. 安装依赖
cd captcha_node
npm install

# 2. 启动 WS 求解器（后台运行）
#    CAPTCHA_WS_URL 默认 ws://127.0.0.1:3000/captcha/ws
node solver.js

# 3. 验证码页面会自动连接服务端
#    打开 http://127.0.0.1:3000/admin/captcha
#    页面和 Node 求解器均可响应验证任务`;

document.getElementById('solver-code').textContent=SOLVER_CODE;
document.getElementById('usage-code').textContent=USAGE_CODE;

wsConnect();
</script>
</body>
</html>
